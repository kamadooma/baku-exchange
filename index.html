<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>BAKU EXCHANGE — A Market of Dreams 夢の取引所</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="grain"></div>
  <div id="vignette"></div>

  <!-- title card -->
  <div id="titlecard">
    <img class="logo-baku" src="assets/baku.webp" alt="獏 Baku" />
    <div class="tc-title">Baku&nbsp;Exchange</div>
    <div class="tc-sub">あなたの夢を、みんなの夢に。<br/>Your dream, everyone's dream.</div>
    <button class="tc-enter">Enter 入場</button>
  </div>

  <!-- ticker tape -->
  <div id="ticker"><div class="ticker-track" id="tickerTrack"></div></div>

  <div id="app">
    <header class="topbar">
      <div class="brand">
        <img class="logo-baku" src="assets/baku.webp" alt="獏" />
        <div class="brand-name">Baku&nbsp;Exchange</div>
      </div>
      <div class="metrics">
        <div class="metric">
          <div class="m-label">Dream Index 夢幻指数</div>
          <div class="m-val num" id="dreamIndex">—</div>
        </div>
        <div class="metric fg">
          <div class="m-label">Fear &amp; Greed</div>
          <canvas id="fgGauge" width="132" height="58"></canvas>
          <div class="m-val" id="fgWord">—</div>
        </div>
        <div class="metric doom">
          <div class="m-label">Apocalypse 終末感</div>
          <div class="m-val num" id="doomVal">—</div>
          <div class="bar"><i id="doomFill"></i></div>
        </div>
      </div>
    </header>

    <main>
      <section class="listings">
        <div class="col-label">Listings 上場銘柄</div>
        <div id="marketList"></div>
      </section>

      <section class="feature">
        <div class="feature-scroll" id="feature"></div>
      </section>

      <aside class="feed">
        <div class="col-label">Tape 取引フィード</div>
        <div id="tradeFeed"></div>
      </aside>
    </main>
  </div>

  <div id="toast"></div>
  <footer class="status"><i id="dataDot"></i><span id="dataStatus">connecting…</span></footer>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
